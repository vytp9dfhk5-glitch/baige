name: Deploy AI card to GitHub Pages

on:
  push:
    branches: [ai-card-source]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baige-ai-card-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AI card source
        uses: actions/checkout@v4

      - name: Checkout existing Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Update the isolated Pages directory
        run: |
          mkdir -p site/ai-card
          rsync -a --delete dist/ site/ai-card/

      - name: Publish
        run: |
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site add -A ai-card
          if git -C site diff --cached --quiet; then
            echo "No deployment changes"
            exit 0
          fi
          git -C site commit -m "deploy: update Baige smart digital card"
          git -C site push origin HEAD:gh-pages
